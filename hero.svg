<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 470" width="1280" height="470" font-family="Georgia, 'Times New Roman', Times, serif" role="img" aria-label="moo — builds systems.">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAB98"/>
      <stop offset="55%" stop-color="#E7C7D2"/>
      <stop offset="100%" stop-color="#A1ECFF"/>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="14s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A1ECFF" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#FFAB98" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A1ECFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A1ECFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A1ECFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1280" height="470" rx="18" fill="#0a0a0a"/>
  <rect x="1" y="1" width="1278" height="468" rx="17" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <!-- drifting aura -->
  <g opacity="0.9">
    <ellipse cx="930" cy="210" rx="430" ry="360" fill="url(#aura)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -40 30; 0 0" dur="11s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- faint dot grid (Textura texture) -->
  <g fill="#ffffff" fill-opacity="0.05">
    <!-- generated lattice -->
    <g>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6s" repeatCount="indefinite"/>
      <circle cx="120" cy="430" r="2"/><circle cx="170" cy="430" r="2"/><circle cx="220" cy="430" r="2"/>
      <circle cx="1120" cy="70" r="2"/><circle cx="1170" cy="70" r="2"/><circle cx="1070" cy="70" r="2"/>
      <circle cx="1120" cy="120" r="2"/><circle cx="1170" cy="120" r="2"/><circle cx="1070" cy="120" r="2"/>
    </g>
  </g>

  <!-- content: visible by default; entrance animation is an enhancement -->
  <g opacity="1">
    <animate attributeName="opacity" from="0" to="1" dur="1.1s" begin="0.1s"/>
    <animateTransform attributeName="transform" type="translate" dur="1.1s" begin="0.1s" calcMode="spline" keySplines="0.16 1 0.3 1" keyTimes="0;1" values="0 28;0 0"/>

    <!-- eyebrow -->
    <line x1="80" y1="92" x2="128" y2="92" stroke="#6a6a6a" stroke-width="1"/>
    <text x="144" y="98" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="6" fill="#C7C7C7">DEVELOPER · BUILDING IN PUBLIC · 2025—</text>

    <!-- square glyph -->
    <rect x="80" y="150" width="86" height="86" fill="none" stroke="#FAFAFA" stroke-width="6">
      <animate attributeName="stroke-opacity" values="1;0.45;1" dur="3.6s" repeatCount="indefinite"/>
    </rect>

    <!-- line 1 -->
    <text x="186" y="228" font-size="104" fill="#FAFAFA" letter-spacing="-2">moo</text>

    <!-- line 2 -->
    <text x="80" y="346" font-size="104" letter-spacing="-2">
      <tspan fill="#FAFAFA">builds </tspan><tspan font-style="italic" fill="url(#grad)">systems.</tspan>
    </text>

    <!-- subtitle -->
    <text x="82" y="420" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#9a9a9a">OSINT pipelines · AI / MCP servers · fintech terminals — shipped end-to-end.</text>
  </g>

  <!-- sweeping scan line -->
  <rect x="0" y="0" width="240" height="470" fill="url(#scan)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" from="-260 0" to="1300 0" dur="7s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
